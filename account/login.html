<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nordic Art Archive</title>
    <link rel="stylesheet" href="../assets/css/variables.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-wrapper">
        <a href="../index.html" class="logo">Nordic Art Archive</a>
        <!--Navbar with the nessesery buttons for an small site + an about page that will be added -->
        <nav class="site-nav" aria-label="Main navigation">
          <a href="../index.html" class="nav-link">Home</a>
          <a href="../artwork.html" class="nav-link">Artworks</a>
          <a href="../about.html" class="nav-link">About</a>
        </nav>

        <div class="header-actions">
          <a href="./login.html" class="btn btn-secondary">Login</a>
          <a href="./register.html" class="btn btn-primary">Register</a>
        </div>
      </div>
    </header>
    <main class="site-main">
      <section class="container auth-section">
        <form class="auth-card" id="loginform" novalidate>
          <h1 class="auth-title">Login</h1>
          <div class="form-group">
            <label for="email" class="form-label">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              class="form-input"
              placeholder="Enter your email"
              required
            />

            <p class="form-error" id="emailError"></p>
          </div>

          <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              class="form-input"
              placeholder="Enter your password"
              required
            />
            <p class="form-error" id="passwordError"></p>
          </div>
          <p id="formMessage" class="form-message"></p>
          <button type="submit" class="btn btn-primary auth-submit">
            Login
          </button>

          <p class="auth-alt">
            Don't have an account?
            <a href="../account/register.html" class="auth-link"></a>
          </p>
        </form>
      </section>
    </main>
    <footer class="site-footer">
      <div class="container footer-wrapper">
        <div class="footer-column">
          <h2 class="footer-title">Navigation</h2>
          <a href="./index.html" class="footer-link">home</a>
          <a href="../about.html" class="footer-link">About us</a>
          <a href="#" class="footer-link">Terms of service</a>
        </div>

        <div class="footer-column">
          <h2 class="footer-title">Contact</h2>
          <p class="footer-text">Email:letsmakethiswork@gamil.com</p>
          <p class="footer-text">Adress: Oslo, norway</p>
          <p class="footer-text">Phone: 64929023</p>
        </div>
      </div>

      <p class="footer-bottom">© 2026 Nordic Art Archive | Steffen Heltne</p>
    </footer>
    <script type="module" src="../assets/js/api/auth.js"></script>
  </body>
</html>
