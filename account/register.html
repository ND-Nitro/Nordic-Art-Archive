<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nordic Art Archive</title>
    <link rel="stylesheet" href="../assets/css/variables.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body>
    <header id="navbar"></header>
    <main class="site-main">
      <section class="container auth-section">
        <form class="auth-card" id="registerform" novalidate>
          <h1 class="auth-title">Register</h1>
          <div class="form-group">
            <label for="name" class="form-label">Name</label>
            <input
              type="text"
              id="name"
              name="name"
              class="form-input"
              placeholder="Enter your name"
              required
            />
            <p class="form-error" id="nameError"></p>
          </div>

          <div class="form-group">
            <label for="email" class="form-label">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              class="form-input"
              placeholder="Enter your email"
              required
            />
            <p class="form-error" id="emailError"></p>
          </div>
          <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input
              type="password"
              id="password"
              minlength="8"
              name="password"
              class="form-input"
              placeholder="Enter your password"
              required
            />
            <p class="form-error" id="passwordError"></p>
          </div>

          <div class="form-group">
            <label for="passwordConfirm" class="form-label">
              Confirm Password
            </label>
            <input
              type="password"
              id="passwordConfirm"
              name="passwordConfirm"
              class="form-input"
              placeholder="Repeat your password"
              required
            />
            <p class="form-error" id="passwordConfirmError"></p>
          </div>
          <p id="formMessage" class="form-message"></p>
          <button type="submit" class="btn btn-primary auth-submit">
            Register
          </button>
          <p class="auth-alt">
            Already have an account?
            <a href="./login.html" class="auth-link">Login here</a>
          </p>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-wrapper">
        <div class="footer-column">
          <h2 class="footer-title">Navigation</h2>
          <a href="../index.html" class="footer-link">home</a>
          <a href="../about.html" class="footer-link">About us</a>
          <a href="#" class="footer-link">Terms of service</a>
        </div>
        <div class="footer-column">
          <h2 class="footer-title">Contact</h2>
          <p class="footer-text">Email:letsmakethiswork@gamil.com</p>
          <p class="footer-text">Adress: Oslo, norway</p>
          <p class="footer-text">Phone: 64929023</p>
        </div>
      </div>

      <p class="footer-bottom">© 2026 Nordic Art Archive | Steffen Heltne</p>
    </footer>
    <script type="module" src="../assets/js/auth.js"></script>
    <script type="module" src="../assets/js/components/navbar.js"></script>
  </body>
</html>
