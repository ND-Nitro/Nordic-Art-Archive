<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Artwork | Nordic Art Archive</title>
    <link rel="stylesheet" href="../assets/css/base/variables.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body>
    <header id="navbar"></header>

    <main class="site-main">
      <section class="container artwork-detail" id="artworkDetail">
        <p class="artwork-breadcrumb">
          <a href="../index.html">Home</a> / <span>Artwork</span>
        </p>

        <h1 class="artwork-title" id="artworkTitle">Loading...</h1>

        <div class="artwork-layout">
          <div class="artwork-image-box">
            <img id="artworkImage" src="" alt="" class="artwork-image" />
          </div>

          <div class="artwork-info">
            <div class="artwork-meta" id="artworkMeta"></div>

            <div
              class="owner-actions hidden"
              id="ownerActions"
              aria-label="Owner actions"
            >
              <a href="#" class="btn btn-primary">Edit</a>
              <button type="button" class="btn btn-danger">Delete</button>
            </div>

            <section class="artwork-description">
              <h2>Description</h2>
              <p id="artworkDescription">Loading description...</p>
            </section>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-wrapper">
        <div class="footer-column">
          <h2 class="footer-title">Navigation</h2>
          <a href="../index.html" class="footer-link">Home</a>
          <a href="../about.html" class="footer-link">About us</a>
          <a href="#" class="footer-link">Terms of service</a>
        </div>

        <div class="footer-column">
          <h2 class="footer-title">Contact</h2>
          <p class="footer-text">Email: letsmakethiswork@gamil.com</p>
          <p class="footer-text">Address: Oslo, Norway</p>
          <p class="footer-text">Phone: 64929023</p>
        </div>
      </div>

      <p class="footer-bottom">© 2026 Nordic Art Archive | Steffen Heltne</p>
    </footer>

    <script type="module" src="../assets/js/components/navbar.js"></script>
    <script type="module" src="../assets/js/artwork.js"></script>
  </body>
</html>
